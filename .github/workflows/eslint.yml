# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support documentation.
#
# ESLint is a tool for identifying and reporting on patterns found in
# ECMAScript/JavaScript code. It ensures architectural consistency.
# More details at https://github.com/eslint/eslint and https://eslint.org

name: 'Security Scan - ESLint'

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '29 5 * * 1'

jobs:
  eslint:
    name: static-analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Matching Next.js 16 requirements
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          npm install @microsoft/eslint-formatter-sarif@latest --save-dev

      - name: Run ESLint Analysis
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: 'true'
        # We use the current project configuration to avoid version conflicts
        run: npx eslint . --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif
        continue-on-error: true

      - name: Upload Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
